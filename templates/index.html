<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Coursework Strategy Assistant</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">DTS114TC Meta-Software Development</p>
      <h1>AI Coursework Strategy Assistant</h1>
    </div>
    <div class="status-pill" id="healthStatus">Checking API</div>
  </header>

  <main class="app-shell">
    <section class="panel task-panel" aria-labelledby="taskFormTitle">
      <div class="panel-heading">
        <h2 id="taskFormTitle">Coursework Task</h2>
        <button class="icon-button" id="sampleBtn" type="button" title="Load sample task">
          <i data-lucide="wand-2"></i>
          <span>Sample</span>
        </button>
      </div>

      <form id="taskForm" class="task-form">
        <label>
          <span>Task title</span>
          <input id="title" name="title" type="text" required maxlength="120" value="DTS114TC Software and Report Coursework">
        </label>

        <div class="form-grid">
          <label>
            <span>Deadline</span>
            <input id="deadline" name="deadline" type="datetime-local" required>
          </label>
          <label>
            <span>Estimated hours</span>
            <input id="estimatedHours" name="estimated_hours" type="number" min="0.5" max="200" step="0.5" value="12">
          </label>
        </div>

        <div class="form-grid">
          <label>
            <span>Importance</span>
            <input id="importance" name="importance" type="range" min="1" max="5" value="5">
          </label>
          <label>
            <span>Complexity</span>
            <select id="complexity" name="complexity">
              <option value="1">1 - simple</option>
              <option value="2">2 - manageable</option>
              <option value="3">3 - moderate</option>
              <option value="4" selected>4 - difficult</option>
              <option value="5">5 - very difficult</option>
            </select>
          </label>
        </div>

        <label>
          <span>Notes</span>
          <textarea id="notes" name="notes" rows="5">Need to satisfy software generation, UML, CI/CD, deployment evidence, testing, and handwritten report decision-making.</textarea>
        </label>

        <div class="button-row">
          <button class="primary-button" type="submit">
            <i data-lucide="sparkles"></i>
            <span>Analyse</span>
          </button>
          <button class="secondary-button" id="saveBtn" type="button">
            <i data-lucide="save"></i>
            <span>Save task</span>
          </button>
        </div>
      </form>
    </section>

    <section class="panel output-panel" aria-labelledby="strategyTitle">
      <div class="panel-heading">
        <h2 id="strategyTitle">Strategy Output</h2>
        <button class="icon-button" id="docsBtn" type="button" title="Generate SDLC documents">
          <i data-lucide="file-stack"></i>
          <span>SDLC</span>
        </button>
      </div>

      <div id="strategySummary" class="summary-grid">
        <div class="metric">
          <span>Priority</span>
          <strong id="priorityLabel">Waiting</strong>
        </div>
        <div class="metric">
          <span>Score</span>
          <strong id="priorityScore">0</strong>
        </div>
        <div class="metric">
          <span>Hours left</span>
          <strong id="hoursLeft">0</strong>
        </div>
      </div>

      <div class="visual-band">
        <img src="{{ url_for('static', filename='generated_strategy_map.png') }}" alt="Generated strategy map showing SDLC stages for the assistant">
      </div>

      <div class="result-columns">
        <div>
          <h3>Action Strategy</h3>
          <ol id="strategyList"></ol>
        </div>
        <div>
          <h3>Risk Flags</h3>
          <ul id="riskList"></ul>
        </div>
      </div>
    </section>

    <section class="panel list-panel" aria-labelledby="tasksTitle">
      <div class="panel-heading">
        <h2 id="tasksTitle">Saved Tasks</h2>
        <button class="icon-button" id="refreshBtn" type="button" title="Refresh saved tasks">
          <i data-lucide="refresh-cw"></i>
          <span>Refresh</span>
        </button>
      </div>
      <div id="taskList" class="task-list"></div>
    </section>

    <section class="panel docs-panel" aria-labelledby="docsTitle">
      <h2 id="docsTitle">Generated SDLC Snapshot</h2>
      <pre id="docsOutput">{}</pre>
    </section>

    <section class="panel uml-panel" aria-labelledby="umlTitle">
      <div class="panel-heading">
        <h2 id="umlTitle">Generated UML Diagrams</h2>
      </div>
      <div class="uml-grid">
        <figure class="uml-card">
          <figcaption>Use Case Diagram</figcaption>
          <img src="{{ url_for('use_case_uml_svg') }}" alt="Generated UML use case diagram for the AI Coursework Strategy Assistant">
        </figure>
        <figure class="uml-card">
          <figcaption>Class Diagram</figcaption>
          <img src="{{ url_for('class_uml_svg') }}" alt="Generated UML class diagram for the AI Coursework Strategy Assistant">
        </figure>
      </div>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
