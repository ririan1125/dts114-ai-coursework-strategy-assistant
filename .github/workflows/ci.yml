name: CI/CD Coursework Workflow

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python files
        run: python -m compileall app.py assistant_engine.py tests

      - name: Run tests
        run: pytest -q

      - name: Deployment readiness note
        run: |
          echo "If tests pass, the same commit can be deployed to Render using gunicorn app:app."

